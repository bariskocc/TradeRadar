<!-- Sidebar -->
<aside class="w-56 bg-dark-800 border-r border-dark-600 flex flex-col min-h-screen shrink-0">
    <!-- Logo -->
    <div class="p-4 border-b border-dark-600">
        <div class="flex items-center gap-2.5">
            <div class="w-8 h-8 rounded-lg bg-accent-blue/20 flex items-center justify-center">
                <svg class="w-4 h-4 text-accent-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
            </div>
            <span class="text-white font-semibold text-lg">TradeRadar</span>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-3 space-y-1">
        <p class="px-3 py-1.5 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Terminal</p>
        <a href="/" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition
            {% if active_page == 'dashboard' %}bg-accent-blue/10 text-accent-blue font-medium{% else %}text-gray-400 hover:bg-dark-700 hover:text-white{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
            Dashboard
        </a>
        <a href="/signals" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition
            {% if active_page == 'signals' %}bg-accent-blue/10 text-accent-blue font-medium{% else %}text-gray-400 hover:bg-dark-700 hover:text-white{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
            All Signals
        </a>

        <a href="/analytics" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition
            {% if active_page == 'analytics' %}bg-accent-blue/10 text-accent-blue font-medium{% else %}text-gray-400 hover:bg-dark-700 hover:text-white{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            Analytics
        </a>
        <a href="/logs" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition
            {% if active_page == 'logs' %}bg-accent-blue/10 text-accent-blue font-medium{% else %}text-gray-400 hover:bg-dark-700 hover:text-white{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Logs
        </a>

        <p class="px-3 py-1.5 mt-4 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Bot</p>
        <a href="/scanner" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm transition
            {% if active_page == 'scanner' %}bg-accent-blue/10 text-accent-blue font-medium{% else %}text-gray-400 hover:bg-dark-700 hover:text-white{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            Scanner
        </a>

        <p class="px-3 py-1.5 mt-4 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Hesap</p>
        <a href="/logout" class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-gray-400 hover:bg-dark-700 hover:text-white text-sm transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            Logout
        </a>
    </nav>

    <!-- User -->
    <div class="p-3 border-t border-dark-600">
        <div class="flex items-center gap-2.5 px-3 py-2">
            <div class="w-7 h-7 rounded-full bg-accent-purple/20 flex items-center justify-center">
                <span class="text-accent-purple text-xs font-bold">{{ user[0]|upper }}</span>
            </div>
            <span class="text-sm text-gray-400">{{ user }}</span>
        </div>
    </div>
</aside>
