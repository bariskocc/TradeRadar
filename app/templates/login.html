{% extends "base.html" %}

{% block title %}TradeRadar - Login{% endblock %}

{% block body %}
<div class="min-h-full flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-dark-700 mb-4">
                <svg class="w-8 h-8 text-accent-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">TradeRadar</h1>
            <p class="text-gray-500 text-sm mt-1">Signal Dashboard</p>
        </div>

        <!-- Login Form -->
        <div class="bg-dark-800 rounded-xl border border-dark-600 p-6">
            {% if error %}
            <div class="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-400 mb-1.5">Username</label>
                    <input type="text" id="username" name="username" required autofocus
                        class="w-full px-3.5 py-2.5 bg-dark-700 border border-dark-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-blue focus:border-transparent transition">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-400 mb-1.5">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-3.5 py-2.5 bg-dark-700 border border-dark-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-blue focus:border-transparent transition">
                </div>
                <button type="submit"
                    class="w-full py-2.5 bg-accent-blue hover:bg-blue-600 text-white font-medium rounded-lg transition-colors duration-200">
                    Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-gray-600 text-xs mt-6">TradeRadar v1.0</p>
    </div>
</div>
{% endblock %}
